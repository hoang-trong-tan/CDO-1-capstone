name: Terraform CI/CD (infra1)

on:
  push:
    branches: ["main", "*"]
    paths:
      - "capstone/tf-3/cdo-1/infra1/**"
      - "capstone/tf-3/cdo-1/infra/modules/**"
      - ".github/workflows/terraform-infra1.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "capstone/tf-3/cdo-1/infra1/**"
      - "capstone/tf-3/cdo-1/infra/modules/**"
      - ".github/workflows/terraform-infra1.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || 'tf3-cdo1-sandbox-tfstate-783459135560' }}
  TF_VAR_tf_state_bucket: ${{ vars.TF_STATE_BUCKET || 'tf3-cdo1-sandbox-tfstate-783459135560' }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'tf3-cdo1-sandbox-tfstate-lock' }}

jobs:
  aws-foundation:
    name: Terraform AWS Foundation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "capstone/tf-3/cdo-1/infra1/aws-foundation"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Bootstrap Terraform Backend
        run: |
          BUCKET_NAME="${{ env.TF_STATE_BUCKET }}"
          TABLE_NAME="${{ env.TF_LOCK_TABLE }}"
          REGION="${{ env.AWS_REGION }}"

          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "S3 bucket $BUCKET_NAME đã tồn tại."
          else
            echo "Đang tạo S3 bucket: $BUCKET_NAME..."
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$REGION" || true
            else
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$REGION" --create-bucket-configuration LocationConstraint="$REGION" || true
            fi
            aws s3api put-bucket-versioning --bucket "$BUCKET_NAME" --versioning-configuration Status=Enabled
          fi

          if ! aws dynamodb describe-table --table-name "$TABLE_NAME" --region "$REGION" 2>/dev/null; then
            echo "Đang tạo DynamoDB table: $TABLE_NAME..."
            aws dynamodb create-table \
              --table-name "$TABLE_NAME" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$REGION"
            aws dynamodb wait table-exists --table-name "$TABLE_NAME" --region "$REGION"
          fi

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=sandbox/infra1/aws-foundation/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test') && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false


  k8s-addons:
    name: Terraform K8s Addons
    needs: aws-foundation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "capstone/tf-3/cdo-1/infra1/k8s-addons"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=sandbox/infra1/k8s-addons/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test') && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
